name: Daily Outcome Collection

on:
  schedule:
    # 07:00 UTC — deliberately ONE HOUR AFTER the in-process APScheduler (06:00)
    # so this acts as a reliable catch-up net instead of racing it. Running both
    # at 06:00 made each due job get fetched twice (the collector hits the
    # provider before claiming the row), wasting tikwm/rapidapi calls. By 07:00
    # the in-process run has already finalized that morning's jobs, so this run
    # mostly finds nothing due — and still covers the case where the Railway
    # process was asleep/restarting at 06:00 (well within the 24h/7d/30d
    # tolerance windows).
    - cron: "0 7 * * *"
  workflow_dispatch:
    inputs:
      limit:
        description: "Max jobs to collect"
        default: "100"

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Wake backend
        run: |
          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://surge-production-8973.up.railway.app/health)
            if [ "$STATUS" = "200" ]; then
              echo "Backend healthy (attempt $i)"
              break
            fi
            echo "Attempt $i: status=$STATUS — waiting 10s"
            sleep 10
          done

      - name: Collect due outcomes
        run: |
          # Capture body AND status so failures are loud and the run log shows
          # how many jobs were processed (the endpoint reads `limit` from the
          # JSON body — query params are ignored).
          RESPONSE=$(curl -sS -w $'\n%{http_code}' -X POST \
            -H "X-Admin-Password: ${{ secrets.ADMIN_PASSWORD }}" \
            -H "Content-Type: application/json" \
            -d '{"limit": ${{ github.event.inputs.limit || 100 }}}' \
            https://surge-production-8973.up.railway.app/api/admin/outcomes/collect-due)
          CODE=$(printf '%s' "$RESPONSE" | tail -n1)
          BODY=$(printf '%s' "$RESPONSE" | sed '$d')
          echo "HTTP $CODE"
          echo "Result: $BODY"
          if [ "$CODE" -lt 200 ] || [ "$CODE" -ge 300 ]; then
            echo "::error::Outcome collection failed with HTTP $CODE"
            exit 1
          fi
