name: Daily Outcome Collection

on:
  schedule:
    # 07:00 UTC. On Render's free tier the instance SLEEPS when idle, so the
    # in-process APScheduler (06:00) usually can't run — this cron is now the
    # PRIMARY driver of outcome collection, not just a catch-up net. It still
    # can't double-fetch (the collector claims each row before hitting the
    # provider), and 07:00 stays well within the 24h/7d/30d tolerance windows.
    # The "Wake backend" step below absorbs the ~50s cold start before collecting.
    - cron: "0 7 * * *"
  workflow_dispatch:
    inputs:
      limit:
        description: "Max jobs to collect"
        default: "100"

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Wake backend
        run: |
          # Render free tier cold-starts (~50s), so give it up to 6 tries.
          for i in 1 2 3 4 5 6; do
            STATUS=$(curl -s -m 60 -o /dev/null -w "%{http_code}" https://craftlint.onrender.com/health)
            if [ "$STATUS" = "200" ]; then
              echo "Backend healthy (attempt $i)"
              break
            fi
            echo "Attempt $i: status=$STATUS — waiting 15s"
            sleep 15
          done

      - name: Collect due outcomes
        env:
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        run: |
          # Capture body AND status so failures are loud and the run log shows
          # how many jobs were processed (the endpoint reads `limit` from the
          # JSON body — query params are ignored).
          # ADMIN_PASSWORD is passed via `env:` rather than interpolated
          # directly into this script: GitHub splices ${{ secrets.X }} into
          # the script as literal text before bash runs it, so a password
          # containing `$something` gets shell-expanded (usually to empty)
          # instead of sent verbatim. Referencing $ADMIN_PASSWORD as a real
          # env var avoids that.
          RESPONSE=$(curl -sS -w $'\n%{http_code}' -X POST \
            -H "X-Admin-Password: $ADMIN_PASSWORD" \
            -H "Content-Type: application/json" \
            -d '{"limit": ${{ github.event.inputs.limit || 100 }}}' \
            https://craftlint.onrender.com/api/admin/outcomes/collect-due)
          CODE=$(printf '%s' "$RESPONSE" | tail -n1)
          BODY=$(printf '%s' "$RESPONSE" | sed '$d')
          echo "HTTP $CODE"
          echo "Result: $BODY"
          if [ "$CODE" -lt 200 ] || [ "$CODE" -ge 300 ]; then
            echo "::error::Outcome collection failed with HTTP $CODE"
            exit 1
          fi
