name: Keep backend alive

# Render's free plan spins the service down after ~15 min of inactivity, causing
# a slow cold-start (20-60s) on the next request. Pinging /health periodically
# keeps it warm. Remove this once the Render plan is upgraded to one that doesn't
# spin down.
#
# Quiet hours: skip pings 12am-6am Pacific (UTC-7 / PDT) since users aren't
# active then — this lets the backend sleep and saves ~6 hrs/day of Render's
# free-tier instance-hour quota. 12am-6am PDT = 07:00-13:00 UTC, so we only
# schedule pings for the UTC hours outside that window (13-23 and 0-6).
# NOTE: this offset is for PDT; it'll be off by an hour during PST (winter).
on:
  schedule:
    - cron: "*/10 13-23 * * *"
    - cron: "*/10 0-6 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: curl -fsS --max-time 60 "${{ secrets.BACKEND_HEALTH_URL }}"
