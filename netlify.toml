[build]
  base    = "frontend"
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Service worker must never be cached by the CDN — browsers need to fetch
# it fresh on each page load to detect updates.
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    Content-Type  = "application/javascript; charset=utf-8"

# Manifest should also stay fresh so PWA metadata updates propagate.
[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    Content-Type  = "application/manifest+json; charset=utf-8"
